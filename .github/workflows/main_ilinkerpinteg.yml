name: Build and deploy Python app to Azure Web App - ilinkerpinteg

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 1. ADD THIS TO STOP THE DEPRECATION WARNINGS
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 2. UPDATED TO v6
      - uses: actions/checkout@v6

      # 3. UPDATED TO v6
      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r backend/requirements.txt
                
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production # Highly recommended for tracking deployments
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9D3B9A9A98564048BA1E4E73C7B12A75 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4CF8BEA3B88146BCBA519FA1025B6E3B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1C60FB6824CC4F24BB7864CF45AF0632 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'ilinkerpinteg'
          slot-name: 'Production'
