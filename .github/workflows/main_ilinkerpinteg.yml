# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy to Azure Web App - ilinkerpinteg

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEBAPP_NAME: ilinkerpinteg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Azure config FIRST ────────────────────────────────────────────────
      # Configure app settings before the build steps so that if a restart
      # is triggered (by changing SCM_DO_BUILD_DURING_DEPLOYMENT etc.) the
      # app has fully restarted by the time the deploy step runs (~3 min later).
      # This eliminates the race condition where the deployment starts while
      # the SCM container is still restarting with old settings active.
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_85056FBA90354C68A4A3D4DB091E25C9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94DC9CA9B4D4482DB44FDF956DB5A691 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B76A997D4E70466B9214833E09942CB0 }}

      # Use AZURE_RESOURCE_GROUP repo secret to skip the slow az webapp list call.
      # To set: GitHub repo → Settings → Secrets → New secret → AZURE_RESOURCE_GROUP
      - name: Resolve resource group
        run: |
          if [ -n "${{ secrets.AZURE_RESOURCE_GROUP }}" ]; then
            echo "RG=${{ secrets.AZURE_RESOURCE_GROUP }}" >> $GITHUB_ENV
          else
            RG=$(az webapp list \
              --query "[?name=='$WEBAPP_NAME'].resourceGroup" -o tsv)
            [ -z "$RG" ] && { echo "ERROR: '$WEBAPP_NAME' not found" >&2; exit 1; }
            echo "RG=$RG" >> $GITHUB_ENV
          fi

      # Run only when settings need updating — skipped on regular code pushes.
      # Even when it runs, the build steps below (~3 min) give the app
      # plenty of time to restart before the deployment begins.
      - name: Configure Azure Web App settings
        if: |
          github.event_name == 'workflow_dispatch' ||
          contains(github.event.head_commit.modified, 'backend/requirements.txt') ||
          contains(github.event.head_commit.modified, '.github/workflows/main_ilinkerpinteg.yml')
        run: |
          az webapp config appsettings set \
            --resource-group "$RG" --name "$WEBAPP_NAME" \
            --settings \
              WEBSITES_PORT=8001 \
              APP_DATA_DIR=/home/data \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              PYTHONPATH=/home/site/wwwroot/.python_packages/lib/site-packages \
            --output none

          az webapp config set \
            --resource-group "$RG" --name "$WEBAPP_NAME" \
            --startup-file "python -m uvicorn main:app --host 0.0.0.0 --port 8001" \
            --output none

      # ── React frontend ────────────────────────────────────────────────────
      # npm cache: restores node_modules in ~5s when package-lock.json is unchanged.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: cd frontend && npm ci && npm run build

      # ── Python packages ───────────────────────────────────────────────────
      # Cache the INSTALLED packages folder keyed on requirements.txt hash.
      # Cache hit  → skip pip install entirely    (~10s restore vs ~3 min install)
      # Cache miss → install runs, result saved for next run
      - name: Cache installed Python packages
        id: cache-py-pkgs
        uses: actions/cache@v4
        with:
          path: backend/.python_packages
          key: py-pkgs-linux-3.11-${{ hashFiles('backend/requirements.txt') }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages into deployment bundle
        if: steps.cache-py-pkgs.outputs.cache-hit != 'true'
        run: |
          pip install \
            --target backend/.python_packages/lib/site-packages \
            -r backend/requirements.txt

      # ── Assemble deployment zip ───────────────────────────────────────────
      # zip uses -x (not --exclude) and plain globs (no **).
      - name: Assemble deployment zip
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/. backend/static/
          cd backend
          zip -r ../deploy.zip . \
            -x "*/__pycache__/*" \
            -x "*/.dist-info/*" \
            -x "*.pyc" \
            -x "*.pyo"
          echo "Zip size: $(du -sh ../deploy.zip | cut -f1)"

      # ── Deploy ────────────────────────────────────────────────────────────
      # By this point, any app-settings restart triggered above has fully
      # completed (build steps take ~3 min) so SCM_DO_BUILD_DURING_DEPLOYMENT=false
      # is guaranteed to be active — Oryx will not run.
      - name: Deploy zip to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: deploy.zip
