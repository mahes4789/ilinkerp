# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - ilinkerpinteg

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Build React frontend ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Copy frontend build into backend/static
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/. backend/static/

      # ── Validate Python dependencies ─────────────────────────────────────
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r backend/requirements.txt

      # ── Upload combined artifact ──────────────────────────────────────────
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ./backend/
            !./backend/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write  # required for OIDC JWT
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_85056FBA90354C68A4A3D4DB091E25C9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94DC9CA9B4D4482DB44FDF956DB5A691 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B76A997D4E70466B9214833E09942CB0 }}

      # Use the runner's pre-installed az CLI (inherits OIDC auth automatically)
      - name: Configure Azure Web App settings
        run: |
          RG=$(az webapp list --query "[?name=='ilinkerpinteg'].resourceGroup" -o tsv)
          if [ -z "$RG" ]; then
            echo "ERROR: Could not find web app 'ilinkerpinteg'" >&2
            exit 1
          fi

          az webapp config appsettings set \
            --resource-group "$RG" \
            --name ilinkerpinteg \
            --settings \
              WEBSITES_PORT=8001 \
              APP_DATA_DIR=/home/data \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true

          az webapp config set \
            --resource-group "$RG" \
            --name ilinkerpinteg \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8001"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ilinkerpinteg'
          package: '.'
