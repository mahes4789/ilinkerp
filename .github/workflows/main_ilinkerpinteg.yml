# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy to Azure Web App - ilinkerpinteg

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEBAPP_NAME: ilinkerpinteg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── React frontend ────────────────────────────────────────────────────
      # cache: 'npm' reuses node_modules across runs when package-lock.json
      # is unchanged — saves ~2-3 min on most pushes.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: cd frontend && npm ci && npm run build

      # ── Python dependencies ───────────────────────────────────────────────
      # Install packages straight into backend/.python_packages so they are
      # shipped with the code.  Azure App Service natively adds
      # .python_packages/lib/site-packages to PYTHONPATH, so Oryx (the
      # Azure-side pip install) is not needed at all.
      # cache: 'pip' reuses the pip HTTP cache — saves ~2-3 min when
      # requirements.txt hasn't changed.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python packages into deployment bundle
        run: |
          pip install \
            --target backend/.python_packages/lib/site-packages \
            -r backend/requirements.txt

      # ── Assemble zip ──────────────────────────────────────────────────────
      - name: Assemble deployment zip
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/. backend/static/
          cd backend
          zip -r ../deploy.zip . \
            --exclude "**/__pycache__/*" \
            --exclude "**/*.pyc" \
            --exclude "**/*.pyo"
          echo "Zip size: $(du -sh ../deploy.zip | cut -f1)"

      # ── Azure ─────────────────────────────────────────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_85056FBA90354C68A4A3D4DB091E25C9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94DC9CA9B4D4482DB44FDF956DB5A691 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B76A997D4E70466B9214833E09942CB0 }}

      # Resolve resource group — skips the slow `az webapp list` call on
      # repeat runs if you add AZURE_RESOURCE_GROUP as a repo secret.
      - name: Resolve resource group
        run: |
          if [ -n "${{ secrets.AZURE_RESOURCE_GROUP }}" ]; then
            echo "RG=${{ secrets.AZURE_RESOURCE_GROUP }}" >> $GITHUB_ENV
          else
            RG=$(az webapp list \
              --query "[?name=='$WEBAPP_NAME'].resourceGroup" -o tsv)
            if [ -z "$RG" ]; then
              echo "ERROR: web app '$WEBAPP_NAME' not found" >&2; exit 1
            fi
            echo "RG=$RG" >> $GITHUB_ENV
          fi

      # One-time idempotent settings — fast after the first run.
      # SCM_DO_BUILD_DURING_DEPLOYMENT=false  →  skip Azure-side pip install
      # PYTHONPATH points to the packages we already shipped in the zip.
      - name: Configure Azure Web App settings
        run: |
          az webapp config appsettings set \
            --resource-group "$RG" --name "$WEBAPP_NAME" \
            --settings \
              WEBSITES_PORT=8001 \
              APP_DATA_DIR=/home/data \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              PYTHONPATH=/home/site/wwwroot/.python_packages/lib/site-packages \
            --output none

          az webapp config set \
            --resource-group "$RG" --name "$WEBAPP_NAME" \
            --startup-file "python -m uvicorn main:app --host 0.0.0.0 --port 8001" \
            --output none

      - name: Deploy zip to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: deploy.zip
