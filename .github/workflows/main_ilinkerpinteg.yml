# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy to Azure Web App - ilinkerpinteg

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WEBAPP_NAME: ilinkerpinteg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC login
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Azure config FIRST ────────────────────────────────────────────────
      # Running config before the build steps means any SCM restart triggered
      # by a settings change is fully complete by the time we deploy (~3 min later).
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_85056FBA90354C68A4A3D4DB091E25C9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94DC9CA9B4D4482DB44FDF956DB5A691 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B76A997D4E70466B9214833E09942CB0 }}

      # Use AZURE_RESOURCE_GROUP repo secret to skip the slow az webapp list call.
      # Set it: GitHub repo → Settings → Secrets → New secret → AZURE_RESOURCE_GROUP
      - name: Resolve resource group
        run: |
          if [ -n "${{ secrets.AZURE_RESOURCE_GROUP }}" ]; then
            echo "RG=${{ secrets.AZURE_RESOURCE_GROUP }}" >> $GITHUB_ENV
          else
            RG=$(az webapp list \
              --query "[?name=='$WEBAPP_NAME'].resourceGroup" -o tsv)
            [ -z "$RG" ] && { echo "ERROR: '$WEBAPP_NAME' not found" >&2; exit 1; }
            echo "RG=$RG" >> $GITHUB_ENV
          fi

      # Skipped on regular code pushes — only runs when settings need updating.
      # SCM_DO_BUILD_DURING_DEPLOYMENT=true lets Oryx install packages using
      # Azure's exact Python 3.11 runtime, which guarantees binary compatibility.
      # Oryx caches the virtual environment (antenv) so repeat builds take ~30s.
      - name: Configure Azure Web App settings
        if: |
          github.event_name == 'workflow_dispatch' ||
          contains(github.event.head_commit.modified, 'backend/requirements.txt') ||
          contains(github.event.head_commit.modified, '.github/workflows/main_ilinkerpinteg.yml')
        run: |
          az webapp config appsettings set \
            --resource-group "$RG" --name "$WEBAPP_NAME" \
            --settings \
              WEBSITES_PORT=8001 \
              APP_DATA_DIR=/home/data \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
            --output none

          az webapp config set \
            --resource-group "$RG" --name "$WEBAPP_NAME" \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8001" \
            --output none

      # ── React frontend ────────────────────────────────────────────────────
      # npm cache: restores node_modules in ~5s when package-lock.json is unchanged.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build React frontend
        run: cd frontend && npm ci && npm run build

      # ── Assemble deployment zip ───────────────────────────────────────────
      # Only source code + built frontend — Oryx installs Python packages on
      # Azure using its own Python 3.11, avoiding any cross-OS ABI issues.
      - name: Assemble deployment zip
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/. backend/static/
          cd backend
          zip -r ../deploy.zip . \
            -x "*/__pycache__/*" \
            -x "*.pyc" \
            -x "*.pyo" \
            -x "*.python_packages/*"
          echo "Zip size: $(du -sh ../deploy.zip | cut -f1)"

      # ── Deploy ────────────────────────────────────────────────────────────
      # The config step above (if it ran) triggered a restart ~3 min ago —
      # the site is fully settled before this upload begins.
      - name: Deploy zip to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: deploy.zip
