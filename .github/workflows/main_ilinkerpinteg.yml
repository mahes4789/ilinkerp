# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - ilinkerpinteg

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 1. ADD THIS TO STOP THE DEPRECATION WARNINGS
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python version
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r backend/requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            ./backend/
            !./backend/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_85056FBA90354C68A4A3D4DB091E25C9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94DC9CA9B4D4482DB44FDF956DB5A691 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B76A997D4E70466B9214833E09942CB0 }}

      - name: Discover resource group from App Service
        uses: azure/CLI@v1
        with:
          azcliversion: 2.64.0
          inlineScript: |
            echo "=== Azure account context ==="
            az account show --query "{name:name, id:id, tenantId:tenantId}" -o json

            echo "=== Subscriptions available to the service principal ==="
            az account list -o table

            echo "=== All Web Apps in current subscription (for debugging) ==="
            az webapp list -o table

            echo "=== Locating web app 'ilinkerpinteg' (searching list) ==="
            WEBAPP_JSON=$(az webapp list --query "[?name=='ilinkerpinteg']" -o json)
            echo "Found entries: $(echo "$WEBAPP_JSON" | jq -c '. | length')"

            RG=$(echo "$WEBAPP_JSON" | jq -r '.[0].resourceGroup')
            echo "Resolved RG='$RG'"

            if [ -z "$RG" ] || [ "$RG" = "null" ]; then
              echo "ERROR: Could not determine resource group for web app 'ilinkerpinteg'." >&2
              echo "$WEBAPP_JSON" | jq -r .
              exit 1
            fi

            az webapp config appsettings set \
              --resource-group "$RG" \
              --name ilinkerpinteg \
              --settings WEBSITES_PORT=8001 APP_DATA_DIR=/home/data SCM_DO_BUILD_DURING_DEPLOYMENT=true

            # Ensure the runtime startup command is correct (uvicorn for FastAPI)
            az webapp config set \
              --resource-group "$RG" \
              --name ilinkerpinteg \
              --startup-file "uvicorn main:app --host 0.0.0.0 --port 8001"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ilinkerpinteg'
          package: './backend/'
